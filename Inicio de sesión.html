<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="iniciosesion.css">
</head>
<body>

    <div class="login-box">
    <h2>Iniciar sesión</h2>

    <input type="text" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">

    <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Recuérdame</label>
    </div>

    <button onclick="iniciarSesion()">Entrar</button>

    <p class="mensaje-error" id="error"></p>
    <p class="mensaje-ok" id="ok"></p>

    <a class="forgot" onclick="recuperarPassword()">¿Olvidaste tu contraseña?</a>

    <div class="signup">
    ¿No tienes cuenta? <a href="formulario.html">Regístrate</a>
    </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAgbY0cBQbXA04FZ9kw53-KSv9B3uZ_XC8",
        authDomain: "infotec-16591.firebaseapp.com",
        projectId: "infotec-16591",
        storageBucket: "infotec-16591.firebasestorage.app",
        messagingSenderId: "894458763283",
        appId: "1:894458763283:web:055ea2a5c97af5ce62c7e6",
        measurementId: "G-BX2DBQM1EG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.iniciarSesion = function () {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('error');
        const okEl = document.getElementById('ok');
        errorEl.textContent = '';
        okEl.textContent = '';

        if (!email || !password) {
        errorEl.textContent = 'Por favor rellena todos los campos.';
        return;}

        signInWithEmailAndPassword(auth, email, password)
        .then((cred) => {
            okEl.textContent = '¡Sesión iniciada correctamente!';
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        })
        .catch((err) => {
            if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
            errorEl.textContent = 'Correo o contraseña incorrectos.';} else if (err.code === 'auth/invalid-email') {
            errorEl.textContent = 'El correo no tiene un formato válido.';} else {
            errorEl.textContent = 'Error al iniciar sesión. Inténtalo de nuevo.';}});};

    window.recuperarPassword = function () {
        const email = document.getElementById('email').value.trim();
        const errorEl = document.getElementById('error');
        const okEl = document.getElementById('ok');
        errorEl.textContent = '';
        okEl.textContent = '';

        if (!email) {
        errorEl.textContent = 'Escribe tu correo arriba para recuperar la contraseña.';
        return;}

        sendPasswordResetEmail(auth, email)
        .then(() => {
            okEl.textContent = 'Correo de recuperación enviado. Revisa tu bandeja.';
        })
        .catch(() => {
            errorEl.textContent = 'No se encontró ninguna cuenta con ese correo.';
        });
    };
    </script>

</body>
</html>
