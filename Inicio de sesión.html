<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="iniciosesion.css">
</head>
<body>

    <div class="login-box">
        <h2>Login</h2>

        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <div class="remember">
            <input type="checkbox">
            <label>Remember me</label>
        </div>

        <button>LOGIN</button>

        <a href="#" class="forgot">Forgot your password?</a>
        <p class="signup">New here? <a href="formulario.html">Sign Up</a></p>
    </div>

</body>
</html>
