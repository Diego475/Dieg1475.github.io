<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <style>
        fieldset {
            background-color: rgba(12, 12, 12, 0.281); margin: auto;width: 70%;
        display: block;}

        legend{font-size: 20px;
        color: rgb(0, 0, 0);}
h1{text-align: center;}
button{margin-left: 50%;color: rgba(12, 11, 12, 0.975); background-color: rgba(141, 208, 208, 0.685);
border-radius: 10%;}
div{width: 50%;
background-color:rgba(204, 174, 110, 0.521);
display: block;
margin: auto;
position: center;
margin-top: 3%;
border-radius: 15%;}
.campo { background-color: burlywood;}
.registro {
    margin-top: 15% !important;
border-radius: 15%;}
body {background-color: rgba(207, 166, 78, 0.637)}

.sexo {background-color:burlywood ;
        height: 80px;}
.contacto {background-color: burlywood;}
.imgfondo{position: absolute;object-fit: fill;width: 80%;margin-left: 10%;}






</style>
</head>

<body><div>
    <br>
    <h1>Crear Cuenta </h1> 
    <fieldset class="campo">
        <legend class="registro">Datos</legend>
        <br>
    Nombre <input type="text">
    <br><br>
    Apellido <input type="text">
    <br><br>
    Dirección <input type="text">
    <br><br>
    Fecha de Nacimiento  <input type="date">
    <br><br>
    <textarea rows="3" cols="50" name="texto" placeholder="Información Adicional"></textarea>
    </fieldset>
    <br>
    <fieldset class="contacto">
<legend>Contacto</legend>
<br>
Teléfono <input type="number">
<br><br>
Correo Electrónico <input type="email">
    </fieldset>
    
    
    <br>
    <fieldset class="sexo"> 
        <legend >Sexo</legend>
        <br>
        <input type="radio" name="sexo" value="Hombre">Hombre
        <input type="radio" name="sexo" value="Mujer">Mujer
        <input type="radio" name="sexo" value="Otro">Otro




    
    </fieldset>
    <br>
    <a href="Mi pagina.html"></a><button>Enviar Registro</button>
    
    
</div>

<img src="/Img/sevillafondo.png" alt="Sevilla Fondo" class="imgfondo">
<img src="/Img/Infotecsinfondo.png" alt="sinfondo" class="infocsinfondo">


</body>
</html>
